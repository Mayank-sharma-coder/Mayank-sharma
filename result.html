<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loan Prediction Result</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:40px;
            width:450px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 0 15px rgba(0,0,0,.2);
        }

        h1{
            margin-bottom:20px;
        }

        h2{
            color:{{ color }};
        }

        p{
            font-size:20px;
        }

        a{
            display:inline-block;
            margin-top:20px;
            text-decoration:none;
            background:#007BFF;
            color:white;
            padding:10px 20px;
            border-radius:8px;
        }

        a:hover{
            background:#0056b3;
        }

    </style>

</head>
<body>

<div class="box">

    <h1>Loan Prediction Result</h1>

    <p>Welcome, <b>{{ name }}</b></p>

    <h2>{{ prediction }}</h2>

    <h3>Eligibility Score : {{ score }}/100</h3>

    <a href="/">Check Another Application</a>

</div>

</body>
</html>
