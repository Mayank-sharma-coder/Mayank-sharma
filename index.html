<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Prediction Form</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#f4f6f9;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        padding:20px;
    }

    .container{
        background:#fff;
        width:700px;
        padding:30px;
        border-radius:12px;
        box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    h2{
        text-align:center;
        color:#2c3e50;
        margin-bottom:20px;
    }

    .form-group{
        margin-bottom:15px;
    }

    label{
        display:block;
        font-weight:bold;
        margin-bottom:5px;
    }

    input, select{
        width:100%;
        padding:10px;
        border:1px solid #ccc;
        border-radius:6px;
        font-size:15px;
    }

    input:focus, select:focus{
        border-color:#3498db;
        outline:none;
    }

    button{
        width:100%;
        padding:12px;
        background:#3498db;
        color:white;
        border:none;
        border-radius:6px;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#2980b9;
    }

    .result{
        margin-top:20px;
        text-align:center;
        font-size:18px;
        font-weight:bold;
        color:green;
    }
</style>

</head>
<body>

<div class="container">

<h2>Loan Prediction Form</h2>

<form id="loanForm">

    <div class="form-group">
        <label>Applicant Name</label>
        <input type="text" required>
    </div>

    <div class="form-group">
        <label>Gender</label>
        <select required>
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
        </select>
    </div>

    <div class="form-group">
        <label>Age</label>
        <input type="number" min="18" required>
    </div>

    <div class="form-group">
        <label>Marital Status</label>
        <select required>
            <option>Single</option>
            <option>Married</option>
        </select>
    </div>

    <div class="form-group">
        <label>Education</label>
        <select required>
            <option>Graduate</option>
            <option>Not Graduate</option>
        </select>
    </div>

    <div class="form-group">
        <label>Employment Status</label>
        <select required>
            <option>Salaried</option>
            <option>Self Employed</option>
            <option>Business</option>
            <option>Unemployed</option>
        </select>
    </div>

    <div class="form-group">
        <label>Monthly Income (₹)</label>
        <input type="number" id="income" required>
    </div>

    <div class="form-group">
        <label>Co-Applicant Monthly Income (₹)</label>
        <input type="number" id="coincome" required>
    </div>

    <div class="form-group">
        <label>Loan Amount Required (₹)</label>
        <input type="number" id="loan" required>
    </div>

    <div class="form-group">
        <label>Loan Term (Months)</label>
        <input type="number" required>
    </div>

    <div class="form-group">
        <label>Credit History</label>
        <select id="credit">
            <option value="1">Good</option>
            <option value="0">Bad</option>
        </select>
    </div>

    <div class="form-group">
        <label>Property Area</label>
        <select>
            <option>Urban</option>
            <option>Semi Urban</option>
            <option>Rural</option>
        </select>
    </div>

    <button type="button" onclick="predictLoan()">
        Predict Loan Eligibility
    </button>

</form>

<div class="result" id="result"></div>

</div>

<script>
function predictLoan(){

    let income = parseFloat(document.getElementById("income").value);
    let coincome = parseFloat(document.getElementById("coincome").value);
    let loan = parseFloat(document.getElementById("loan").value);
    let credit = parseInt(document.getElementById("credit").value);

    let totalIncome = income + coincome;

    if(credit == 1 && totalIncome >= loan/5){
        document.getElementById("result").innerHTML =
        "✅ Loan Likely to be Approved";
        document.getElementById("result").style.color="green";
    }
    else{
        document.getElementById("result").innerHTML =
        "❌ Loan Likely to be Rejected";
        document.getElementById("result").style.color="red";
    }
}
</script>

</body>
</html>
