<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fertilizer Recommendation</title>
</head>
<body>
    
    <h1>Fertilizer Recommendation System</h1>
    <form method="GET" action="{{ url_for('fertilizer') }}">
        <label for="S"> Sulpher (S ):</label>
        <input type="number" id="S" name="S" step="any" required > %
        <br><br>
        <label for="Ca"> Calcium (Ca ):</label>
        <input type="number" id="Ca" name="Ca" step="any" required> %
        <br><br>
        <label for="Zn"> Zinc (Zn ):</label>
        <input type="number" id="Zn" name="Zn" step="any" required> %
        <br><br>
        <label for="B"> Boron (B ):</label>
        <input type="number" id="B" name="B" step="any" required> %
        <br><br>
        <label for="Fe"> Iron (Fe ):</label>
        <input type="number" id="Fe" name="Fe" step="any" required> %
        <br><br>
        <label for="Mg"> Magnesium (Mg ):</label>
        <input type="number" id="Mg" name="Mg" step="any" required> %
        <br><br>
        <label for="N"> Nitrogen (N ):</label>
        <input type="number" id="N" name="N" step="any" required> %
        <br><br>
        <button type="submit">Submit</button>
    </form>
    
</body>
</html>
